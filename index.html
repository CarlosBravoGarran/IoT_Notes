<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/6357/6357665.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap');

        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1c1f26;
            --accent: #2563eb;
            --muted: #6b7280;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            font-family: 'Syne', sans-serif;
            color: var(--text);
        }

        .container {
            width: 90%;
            height: 90vh;
            padding: 2rem;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin: 0 0 1.5rem;
            font-size: 3rem;
            text-align: center;
        }

        .links {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 150px;
            gap: 1rem;
            padding: 1rem 0.5rem;
        }

        .links a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 200px;
            gap: 0.5rem;
            padding: 1.2rem;
            border-radius: 18px;
            background: #eef4ff;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .links a:hover {
            background: #dbe7ff;
            transform: translateY(-1px);
        }

        .tema {
            color:#1c1f26
        }

    </style>
</head>
<body>
    <main class="container">
        <h1>Apuntes IoT</h1>
        <div class="links">
            <a href="Tema01.html">
                <div class="tema">Tema 01</div>
                <div>Introducción y Arquitectura IoT</div>
            </a>
            <a href="Tema02.html">
                <div class="tema">Tema 02</div>
                <div>Sensores y Actuadores</div>
            </a>
            <a href="Tema03.html">
                <div class="tema">Tema 03</div>
                <div>SO Embebidos para IoT</div>
            </a>
            <a href="Tema05.html">
                <div class="tema">Tema 05</div>
                <div>Contenedores</div>
            </a>
            <a href="Tema06.html">
                <div class="tema">Tema 06</div>
                <div>Protocolos para dispositivos IoT</div>
            </a>
            <a href="Tema07.html">
                <div class="tema">Tema 07</div>
                <div>Microservicios</div>
            </a>
        </div>
    </main>
</body>
</html>
